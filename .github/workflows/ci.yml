name: CI — COCO COLORS Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install flake8
        run: pip install flake8
      - name: Flake8 lint
        run: flake8 pipeline/ tests/ evals/ --max-line-length 120 --ignore=E501,W503 || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install pytest
      - name: Run unit tests
        run: pytest tests/unit/ -v

  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Run eval stub
        run: python evals/run_evals.py --dataset evals/datasets/simulated_v1.jsonl
